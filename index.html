<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنيو الإلكتروني الخاص بنا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center mb-8">
        <h1 id="restaurant-title" class="text-2xl font-bold text-orange-600">القائمة اللذيذة</h1>
        <button onclick="checkAdmin()" class="text-sm bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded font-bold transition">الإدارة</button>
    </nav>

    <div class="container mx-auto px-4 max-w-5xl mb-12 flex-grow">
        
        <div id="customer-view">
            <h2 class="text-3xl font-bold text-center mb-8">أصناف المنيو</h2>
            <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
            
            <div id="whatsapp-footer" class="mt-20 mb-8 max-w-2xl mx-auto text-center hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <h3 class="text-2xl font-bold text-orange-600 mb-3">رأيك يهمنا جداً! 🌟</h3>
                <p class="text-gray-600 mb-6 leading-relaxed font-medium text-lg">
                    نسعى دائماً لتقديم تجربة مميزة تليق بكم.<br>
                    إذا كان لديكم أي اقتراحات لتطويرنا، أو واجهتكم أي مشكلة، لا تترددوا أبداً في التواصل معنا مباشرة. نحن هنا للاستماع إليكم!
                </p>
                <a id="whatsapp-link" href="#" target="_blank" class="inline-flex items-center justify-center gap-3 bg-green-500 text-white px-8 py-4 rounded-full hover:bg-green-600 transition shadow-lg font-bold text-xl hover:shadow-xl transform hover:-translate-y-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16">
                        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                    </svg>
                    <span id="whatsapp-display-number" dir="ltr" class="tracking-wider"></span>
                </a>
            </div>
        </div>

        <div id="admin-view" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow">
                <h2 class="text-2xl font-bold text-blue-600">لوحة التحكم</h2>
                <button onclick="logoutAdmin()" class="text-white bg-red-500 hover:bg-red-600 px-4 py-2 rounded font-bold transition">خروج وعودة للمنيو</button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg">
                <h3 class="text-xl font-bold mb-4 border-b pb-2">إعدادات المنيو العامة</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 items-end">
                    <div>
                        <label class="block font-bold mb-1">اسم المطعم أو الكافيه</label>
                        <input type="text" id="restaurant-name-input" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="أدخل اسم المكان...">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">العملة (مثال: ج.م، ريال)</label>
                        <input type="text" id="currency-input" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="أدخل العملة هنا...">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">رقم الواتساب (للشكاوي)</label>
                        <input type="text" id="whatsapp-input" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="مثال: 201xxxxxxxxx+" dir="ltr">
                    </div>
                    <div class="sm:col-span-2 lg:col-span-3 mt-2">
                        <button onclick="saveSettings()" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 font-bold transition w-full">حفظ الإعدادات</button>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg shadow-lg lg:col-span-1 h-fit">
                    <h3 id="form-title" class="text-xl font-bold mb-4 border-b pb-2">إضافة صنف جديد</h3>
                    <form id="add-item-form" class="space-y-4">
                        <input type="hidden" id="edit-index" value="-1">
                        <div>
                            <label class="block font-bold mb-1">التصنيف (مثال: مشروبات، وجبات)</label>
                            <input type="text" id="item-category" required class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                        <div>
                            <label class="block font-bold mb-1">اسم الصنف</label>
                            <input type="text" id="item-name" required class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                        <div>
                            <label class="block font-bold mb-1">السعر</label>
                            <input type="number" id="item-price" required class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
                        </div>
                        <button type="submit" id="submit-btn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 w-full font-bold transition">حفظ الصنف</button>
                        <button type="button" onclick="cancelEdit()" id="cancel-btn" class="hidden bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500 w-full font-bold transition mt-2">إلغاء التعديل</button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-lg lg:col-span-2">
                    <h3 class="text-xl font-bold mb-4 border-b pb-2">الأصناف الحالية (تعديل / حذف)</h3>
                    <div id="admin-items-list" class="space-y-4">
                        </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const ADMIN_PASSWORD = "2026***";
        
        // جلب البيانات والإعدادات من المتصفح
        let menuItems = JSON.parse(localStorage.getItem('myMenu')) || [];
        let currentCurrency = localStorage.getItem('menuCurrency') || "ج.م";
        let currentRestaurantName = localStorage.getItem('restaurantName') || "اسم مكانك هنا";
        let currentWhatsappNumber = localStorage.getItem('whatsappNumber') || "";

        // تطبيق الإعدادات عند فتح الصفحة
        document.getElementById('restaurant-title').innerText = currentRestaurantName;
        updateWhatsappDisplay();

        // تحديث عرض الرسالة ورقم الواتساب للزبائن
        function updateWhatsappDisplay() {
            const footer = document.getElementById('whatsapp-footer');
            const link = document.getElementById('whatsapp-link');
            const displayNumber = document.getElementById('whatsapp-display-number');
            
            if (currentWhatsappNumber && currentWhatsappNumber.trim() !== "") {
                footer.classList.remove('hidden');
                
                // تنظيف الرقم لعمل الرابط بشكل سليم
                const cleanNumber = currentWhatsappNumber.replace(/\s+/g, '').replace('+', '');
                
                link.href = `https://wa.me/${cleanNumber}`;
                displayNumber.innerText = currentWhatsappNumber;
            } else {
                footer.classList.add('hidden');
            }
        }

        // 1. عرض المنيو للزبائن
        function renderCustomerMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = ''; 

            if (menuItems.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500 text-lg mt-10">لم يتم إضافة أصناف بعد...</p>';
                return;
            }

            const categories = {};
            menuItems.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });

            for (const [category, items] of Object.entries(categories)) {
                container.innerHTML += `
                    <div class="col-span-full mt-8 mb-2">
                        <h3 class="text-2xl font-bold border-b-2 border-orange-500 inline-block pb-1 text-gray-700">${category}</h3>
                    </div>
                `;
                items.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-lg shadow hover:shadow-lg transition-shadow border border-gray-100 flex justify-between items-center">
                            <h4 class="text-lg font-bold">${item.name}</h4>
                            <p class="text-orange-600 font-bold text-xl">${item.price} <span class="text-sm">${currentCurrency}</span></p>
                        </div>
                    `;
                });
            }
        }

        // 2. عرض الأصناف في لوحة التحكم للمدير
        function renderAdminItems() {
            const list = document.getElementById('admin-items-list');
            list.innerHTML = '';

            if (menuItems.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm">لا توجد أصناف حالياً.</p>';
                return;
            }

            menuItems.forEach((item, index) => {
                list.innerHTML += `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 p-4 rounded border">
                        <div class="mb-2 sm:mb-0">
                            <span class="font-bold text-lg">${item.name}</span>
                            <span class="text-sm text-gray-500 mx-2">(${item.category})</span>
                            <span class="text-orange-600 font-bold block sm:inline mt-1 sm:mt-0">${item.price} ${currentCurrency}</span>
                        </div>
                        <div class="flex space-x-2 space-x-reverse mt-2 sm:mt-0">
                            <button onclick="editItem(${index})" class="bg-green-500 text-white px-3 py-1 rounded text-sm hover:bg-green-600 transition">تعديل</button>
                            <button onclick="deleteItem(${index})" class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600 transition">حذف</button>
                        </div>
                    </div>
                `;
            });
        }

        // 3. حفظ الإعدادات
        function saveSettings() {
            const newName = document.getElementById('restaurant-name-input').value.trim();
            const newCurrency = document.getElementById('currency-input').value.trim();
            const newWhatsapp = document.getElementById('whatsapp-input').value.trim();

            if(newName !== "") {
                currentRestaurantName = newName;
                localStorage.setItem('restaurantName', currentRestaurantName);
                document.getElementById('restaurant-title').innerText = currentRestaurantName;
            }
            
            if(newCurrency !== "") {
                currentCurrency = newCurrency;
                localStorage.setItem('menuCurrency', currentCurrency);
            }

            currentWhatsappNumber = newWhatsapp;
            localStorage.setItem('whatsappNumber', currentWhatsappNumber);
            updateWhatsappDisplay();

            alert("تم حفظ الإعدادات بنجاح!");
            renderAdminItems();
        }

        // 4. التحقق من الدخول
        function checkAdmin() {
            const pass = prompt("الرجاء إدخال كلمة المرور للوحة التحكم:");
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('customer-view').classList.add('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                
                document.getElementById('restaurant-name-input').value = currentRestaurantName;
                document.getElementById('currency-input').value = currentCurrency;
                document.getElementById('whatsapp-input').value = currentWhatsappNumber;
                
                renderAdminItems(); 
            } else if (pass !== null) {
                alert("كلمة المرور غير صحيحة!");
            }
        }

        // 5. الخروج من لوحة التحكم
        function logoutAdmin() {
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('customer-view').classList.remove('hidden');
            cancelEdit();
            renderCustomerMenu(); 
        }

        // 6. إضافة أو تعديل صنف
        document.getElementById('add-item-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const category = document.getElementById('item-category').value.trim();
            const name = document.getElementById('item-name').value.trim();
            const price = document.getElementById('item-price').value;
            const editIndex = parseInt(document.getElementById('edit-index').value);

            if (editIndex === -1) {
                menuItems.push({ category, name, price });
                alert("تم إضافة الصنف بنجاح!");
            } else {
                menuItems[editIndex] = { category, name, price };
                alert("تم تعديل الصنف بنجاح!");
                cancelEdit();
            }

            localStorage.setItem('myMenu', JSON.stringify(menuItems));
            this.reset();
            renderAdminItems();
        });

        // 7. تجهيز صنف للتعديل
        function editItem(index) {
            const item = menuItems[index];
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-price').value = item.price;
            
            document.getElementById('edit-index').value = index;
            document.getElementById('form-title').innerText = "تعديل الصنف";
            document.getElementById('submit-btn').innerText = "حفظ التعديلات";
            document.getElementById('submit-btn').classList.replace('bg-blue-600', 'bg-green-600');
            document.getElementById('submit-btn').classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
            document.getElementById('cancel-btn').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 8. إلغاء وضع التعديل
        function cancelEdit() {
            document.getElementById('add-item-form').reset();
            document.getElementById('edit-index').value = -1;
            document.getElementById('form-title').innerText = "إضافة صنف جديد";
            document.getElementById('submit-btn').innerText = "حفظ الصنف";
            document.getElementById('submit-btn').classList.replace('bg-green-600', 'bg-blue-600');
            document.getElementById('submit-btn').classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        // 9. حذف صنف
        function deleteItem(index) {
            if (confirm("هل أنت متأكد أنك تريد حذف هذا الصنف؟")) {
                menuItems.splice(index, 1);
                localStorage.setItem('myMenu', JSON.stringify(menuItems));
                renderAdminItems();
                
                if (parseInt(document.getElementById('edit-index').value) === index) {
                    cancelEdit();
                }
            }
        }

        // تشغيل عرض المنيو عند فتح الصفحة
        renderCustomerMenu();
    </script>
</body>
</html>
